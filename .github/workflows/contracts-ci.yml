name: Contracts CI

on:
  push:
    branches: [main, dev]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

permissions:
  contents: read

env:
  # Pin to match local tooling; bump when upgrading. Official binaries avoid cargo build (hidapi/libudev/dbus).
  STELLAR_CLI_VERSION: "25.1.0"

jobs:
  contracts-build-test:
    name: Contracts Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Stellar CLI (release binary)
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) triple=x86_64-unknown-linux-gnu ;;
            aarch64) triple=aarch64-unknown-linux-gnu ;;
            *) echo "unsupported runner architecture: $(uname -m)"; exit 1 ;;
          esac
          ver="${STELLAR_CLI_VERSION}"
          url="https://github.com/stellar/stellar-cli/releases/download/v${ver}/stellar-cli-${ver}-${triple}.tar.gz"
          curl -fsSL "$url" | tar xz
          mkdir -p "${HOME}/.local/bin"
          install -m 755 stellar "${HOME}/.local/bin/stellar"
          rm -f stellar
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          stellar version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts

      # WASM must exist BEFORE `cargo test`: upgrade/event tests `include_bytes!`
      # the built wasm, which is resolved at compile time. Build both contracts.
      - name: Build contract wasm (pool + badges)
        run: |
          (cd vaquita-pool && stellar contract build)
          (cd vaquita-badges && stellar contract build)

      - name: Run contract tests
        run: cargo test --workspace

  contracts-coverage:
    name: Contracts Coverage (llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (with llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: wasm32v1-none

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts

      # Same include_bytes! requirement as the test job. Build via plain cargo
      # (no stellar CLI needed here); the raw contract wasm is a valid upload
      # target for the upgrade tests.
      - name: Build contract wasm (pool + badges)
        run: cargo build --release --target wasm32v1-none -p vaquita-pool -p vaquita-badges

      # Prebuilt binary instead of `cargo install --locked` (which compiles from
      # source on every run) — saves several minutes.
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: contracts/lcov.info
          disable_search: true
          flags: contracts
          name: contracts-lcov
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts-lcov
          path: contracts/lcov.info

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts-coverage-html
          path: contracts/coverage-html

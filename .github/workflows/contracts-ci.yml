name: Contracts CI

on:
  push:
    branches: [main, dev]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

permissions:
  contents: read

env:
  # Pin to match local tooling; bump when upgrading. Official binaries avoid cargo build (hidapi/libudev/dbus).
  STELLAR_CLI_VERSION: "25.1.0"

jobs:
  contracts-build-test:
    name: Contracts Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Stellar CLI (release binary)
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) triple=x86_64-unknown-linux-gnu ;;
            aarch64) triple=aarch64-unknown-linux-gnu ;;
            *) echo "unsupported runner architecture: $(uname -m)"; exit 1 ;;
          esac
          ver="${STELLAR_CLI_VERSION}"
          url="https://github.com/stellar/stellar-cli/releases/download/v${ver}/stellar-cli-${ver}-${triple}.tar.gz"
          curl -fsSL "$url" | tar xz
          mkdir -p "${HOME}/.local/bin"
          install -m 755 stellar "${HOME}/.local/bin/stellar"
          rm -f stellar
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          stellar version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build contract wasm
        run: |
          cd vaquita-pool
          stellar contract build

  contracts-coverage:
    name: Contracts Coverage (llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (with llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate lcov report
        run: |
          cargo llvm-cov --workspace --all-features --remap-path-prefix \
            --ignore-filename-regex '/test/|defindex_vault\.rs|vaquita-pool/src/types\.rs' \
            --lcov --output-path lcov.info

      - name: Generate HTML report
        run: |
          cargo llvm-cov report --remap-path-prefix \
            --ignore-filename-regex '/test/|defindex_vault\.rs|vaquita-pool/src/types\.rs' \
            --fail-under-lines 80 \
            --html --output-dir coverage-html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: contracts/lcov.info
          disable_search: true
          flags: contracts
          name: contracts-lcov
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts-lcov
          path: contracts/lcov.info

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts-coverage-html
          path: contracts/coverage-html

server {
    listen 80;
    server_name api-service.vaquita.fi;

    # Redirige todo a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-service.vaquita.fi;

    ssl_certificate     /etc/letsencrypt/live/api-service.vaquita.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-service.vaquita.fi/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
